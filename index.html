<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Replacement Algorithm Simulator</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 30px 0;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            color: #00d9ff;
            margin-bottom: 10px;
        }

        .input-section {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #00d9ff;
            font-weight: bold;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #555;
            background: #111;
            color: white;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .algorithm-selection {
            display: flex;
            gap: 10px;
        }

        .algorithm-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #222;
            color: white;
        }

        .algorithm-btn.active {
            background: #00d9ff;
            color: black;
        }

        .button-row {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-primary {
            background: #00d9ff;
            color: black;
        }

        .btn-secondary {
            background: #444;
            color: white;
        }

        .btn-clear {
            background: crimson;
            color: white;
        }

        .results-section {
            display: none;
        }

        .results-section.show {
            display: block;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card .value {
            font-size: 2rem;
            margin-top: 10px;
        }

        .simulation-table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #444;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #00d9ff;
            color: black;
        }

        .status-hit {
            color: lime;
            font-weight: bold;
        }

        .status-fault {
            color: red;
            font-weight: bold;
        }

        .reference-highlight {
            background: rgba(0,217,255,0.2);
        }

        .algorithm-info {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-left: 4px solid #00d9ff;
        }
    </style>
</head>

<body>

<div class="container">

    <header>
        <h1>🖥️ Page Replacement Algorithm Simulator</h1>
        <p>Visualize FIFO, Optimal, and LRU algorithms<BR>
        Renz Derick L. Ronquillo BSCS-3C
        </p>

    </header>

    <section class="input-section">

        <div class="input-group">
            <label>Reference String</label>
            <input type="text" id="referenceString"
                placeholder="7 0 1 2 0 3 0 4 2 3 0 3 2">
        </div>

        <div class="input-row">

            <div class="input-group">
                <label>Number of Frames</label>
                <input type="number" id="numFrames" min="1" max="10">
            </div>

            <div class="input-group">
                <label>Algorithm</label>

                <div class="algorithm-selection">
                    <button class="algorithm-btn active" data-algorithm="fifo">FIFO</button>
                    <button class="algorithm-btn" data-algorithm="optimal">Optimal</button>
                    <button class="algorithm-btn" data-algorithm="lru">LRU</button>
                </div>
            </div>
        </div>

        <div class="button-row">
            <button class="btn btn-primary" id="simulateBtn">Run Simulation</button>
            <button class="btn btn-secondary" id="randomBtn">Random</button>
            <button class="btn btn-clear" id="clearBtn">Clear</button>
        </div>

    </section>

    <section class="results-section" id="resultsSection">

        <div class="stats-grid">

            <div class="stat-card">
                <h3>Algorithm</h3>
                <div class="value" id="statAlgorithm">-</div>
            </div>

            <div class="stat-card">
                <h3>Faults</h3>
                <div class="value" id="statFaults">-</div>
            </div>

            <div class="stat-card">
                <h3>Hits</h3>
                <div class="value" id="statHits">-</div>
            </div>

            <div class="stat-card">
                <h3>Hit Ratio</h3>
                <div class="value" id="statRatio">-</div>
            </div>

        </div>

        <div class="simulation-table-container">

            <table>
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>

            <div class="algorithm-info" id="algorithmInfo"></div>

        </div>

    </section>

</div>

<script>

const referenceStringInput = document.getElementById("referenceString");
const numFramesInput = document.getElementById("numFrames");

const algorithmBtns = document.querySelectorAll(".algorithm-btn");

const simulateBtn = document.getElementById("simulateBtn");
const randomBtn = document.getElementById("randomBtn");
const clearBtn = document.getElementById("clearBtn");

const resultsSection = document.getElementById("resultsSection");

const tableHead = document.getElementById("tableHead");
const tableBody = document.getElementById("tableBody");

let selectedAlgorithm = "fifo";

const algorithmDescriptions = {

    fifo: {
        name: "FIFO",
        description: "First In First Out replaces the oldest page."
    },

    optimal: {
        name: "Optimal",
        description: "Optimal replaces the page used farthest in the future."
    },

    lru: {
        name: "LRU",
        description: "Least Recently Used replaces the least recently accessed page."
    }
};

algorithmBtns.forEach(btn => {

    btn.addEventListener("click", () => {

        algorithmBtns.forEach(b => b.classList.remove("active"));

        btn.classList.add("active");

        selectedAlgorithm = btn.dataset.algorithm;
    });

});

simulateBtn.addEventListener("click", runSimulation);

randomBtn.addEventListener("click", generateRandomString);

clearBtn.addEventListener("click", clearAll);

function generateRandomString() {

    const length = Math.floor(Math.random() * 10) + 8;

    const pages = [];

    for (let i = 0; i < length; i++) {

        pages.push(Math.floor(Math.random() * 10));

    }

    referenceStringInput.value = pages.join(" ");

}

function clearAll() {

    referenceStringInput.value = "";
    numFramesInput.value = "";

    resultsSection.classList.remove("show");

}

function runSimulation() {

    const pages = referenceStringInput.value
        .trim()
        .split(/\s+/)
        .map(Number);

    const numFrames = parseInt(numFramesInput.value);

    if (pages.length === 0 || isNaN(numFrames)) {

        alert("Please enter valid inputs.");

        return;
    }

    let result;

    if (selectedAlgorithm === "fifo") {

        result = simulateFIFO(pages, numFrames);

    } else if (selectedAlgorithm === "optimal") {

        result = simulateOptimal(pages, numFrames);

    } else {

        result = simulateLRU(pages, numFrames);

    }

    displayResults(result, numFrames);

}

function simulateFIFO(pages, numFrames) {

    const frames = [];

    const queue = [];

    const steps = [];

    let faults = 0;
    let hits = 0;

    for (let i = 0; i < pages.length; i++) {

        const page = pages[i];

        let isHit = false;

        if (frames.includes(page)) {

            hits++;
            isHit = true;

        } else {

            faults++;

            if (frames.length < numFrames) {

                frames.push(page);
                queue.push(page);

            } else {

                const oldest = queue.shift();

                const index = frames.indexOf(oldest);

                frames[index] = page;

                queue.push(page);
            }
        }

        steps.push({
            page,
            frames: [...frames],
            isHit
        });
    }

    return {
        steps,
        faults,
        hits,
        algorithm: "FIFO"
    };
}

function simulateOptimal(pages, numFrames) {

    const frames = [];

    const steps = [];

    let faults = 0;
    let hits = 0;

    for (let i = 0; i < pages.length; i++) {

        const page = pages[i];

        let isHit = false;

        if (frames.includes(page)) {

            hits++;
            isHit = true;

        } else {

            faults++;

            if (frames.length < numFrames) {

                frames.push(page);

            } else {

                let farthest = -1;
                let replaceIndex = 0;

                for (let j = 0; j < frames.length; j++) {

                    const nextUse = pages.slice(i + 1).indexOf(frames[j]);

                    if (nextUse === -1) {

                        replaceIndex = j;
                        break;
                    }

                    if (nextUse > farthest) {

                        farthest = nextUse;
                        replaceIndex = j;
                    }
                }

                frames[replaceIndex] = page;
            }
        }

        steps.push({
            page,
            frames: [...frames],
            isHit
        });
    }

    return {
        steps,
        faults,
        hits,
        algorithm: "Optimal"
    };
}

function simulateLRU(pages, numFrames) {

    const frames = [];

    const recent = [];

    const steps = [];

    let faults = 0;
    let hits = 0;

    for (let i = 0; i < pages.length; i++) {

        const page = pages[i];

        let isHit = false;

        if (frames.includes(page)) {

            hits++;
            isHit = true;

            const index = recent.indexOf(page);

            recent.splice(index, 1);

            recent.push(page);

        } else {

            faults++;

            if (frames.length < numFrames) {

                frames.push(page);

                recent.push(page);

            } else {

                const lru = recent.shift();

                const replaceIndex = frames.indexOf(lru);

                frames[replaceIndex] = page;

                recent.push(page);
            }
        }

        steps.push({
            page,
            frames: [...frames],
            isHit
        });
    }

    return {
        steps,
        faults,
        hits,
        algorithm: "LRU"
    };
}

function displayResults(result, numFrames) {

    document.getElementById("statAlgorithm").textContent = result.algorithm;

    document.getElementById("statFaults").textContent = result.faults;

    document.getElementById("statHits").textContent = result.hits;

    const ratio = ((result.hits /
        (result.hits + result.faults)) * 100).toFixed(1);

    document.getElementById("statRatio").textContent =
        ratio + "%";

    let header = `
        <tr>
            <th>Step</th>
            <th>Page</th>
    `;

    for (let i = 0; i < numFrames; i++) {

        header += `<th>Frame ${i + 1}</th>`;
    }

    header += `<th>Status</th></tr>`;

    tableHead.innerHTML = header;

    let body = "";

    result.steps.forEach((step, index) => {

        body += `
            <tr>
                <td>${index + 1}</td>
                <td class="reference-highlight">${step.page}</td>
        `;

        for (let i = 0; i < numFrames; i++) {

            body += `
                <td>
                    ${step.frames[i] !== undefined ? step.frames[i] : "-"}
                </td>
            `;
        }

        body += `
            <td class="${step.isHit ? 'status-hit' : 'status-fault'}">
                ${step.isHit ? 'Hit' : 'Fault'}
            </td>
            </tr>
        `;
    });

    tableBody.innerHTML = body;

    const info = algorithmDescriptions[selectedAlgorithm];

    document.getElementById("algorithmInfo").innerHTML = `
        <h3>${info.name}</h3>
        <p>${info.description}</p>
    `;

    resultsSection.classList.add("show");
}

</script>

</body>
</html>
